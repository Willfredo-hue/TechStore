<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>TechStore - Registro de Clientes</title>
    <link rel="icon" href="img/Icono.png" type="image/png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/estilos.css" />
  </head>

  <body class="bg-dark d-flex align-items-center min-vh-100 py-5">
    <section id="registro" class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="mb-3">
            <a href="index.html" class="btn btn-outline-light btn-sm">
              ← Volver a la Tienda
            </a>
          </div>

          <div class="registro p-4 shadow rounded bg-light">
            <h2 class="text-center mb-4">Registro de Clientes</h2>

            <form id="formRegistro" class="needs-validation" novalidate>
              <div class="row">
                <!-- NOMBRE -->
                <div class="col-md-6 mb-3">
                  <label class="form-label"> Nombre Completo </label>

                  <input
                    type="text"
                    id="regNombre"
                    class="form-control"
                    required
                    maxlength="60"
                    data-bs-toggle="tooltip"
                    title="Ingrese su nombre completo"
                  />
                </div>

                <!-- EMAIL -->
                <div class="col-md-6 mb-3">
                  <label class="form-label"> Correo Electrónico </label>

                  <input
                    type="email"
                    id="regEmail"
                    class="form-control"
                    required
                    data-bs-toggle="tooltip"
                    title="Ingrese un correo válido"
                  />
                </div>

                <!-- TELEFONO -->
                <div class="col-md-6 mb-3">
                  <label class="form-label"> Teléfono </label>

                  <input
                    type="text"
                    id="regTelefono"
                    class="form-control"
                    required
                    pattern="^[0-9]{8}$"
                    maxlength="8"
                    data-bs-toggle="tooltip"
                    title="El teléfono debe contener 8 números"
                  />
                </div>

                <!-- DIRECCION -->
                <div class="col-md-6 mb-3">
                  <label class="form-label"> Dirección </label>

                  <input
                    type="text"
                    id="regDireccion"
                    class="form-control"
                    required
                    maxlength="50"
                    data-bs-toggle="tooltip"
                    title="Ingrese su dirección"
                  />
                </div>

                <!-- USUARIO -->
                <div class="col-md-6 mb-3">
                  <label class="form-label"> Usuario </label>

                  <input
                    type="text"
                    id="regUsuario"
                    class="form-control"
                    required
                    pattern="^[a-zA-Z0-9]{3,15}$"
                    maxlength="15"
                    data-bs-toggle="tooltip"
                    title="Solo letras y números (3 a 15 caracteres)"
                  />
                </div>

                <!-- PASSWORD -->

                <div class="col-md-6 mb-3">
                  <label class="form-label"> Contraseña </label>

                  <div class="input-group">
                    <input
                      type="password"
                      id="regPassword"
                      class="form-control"
                      required
                      pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])[A-Za-z\d]{8,10}$"
                      maxlength="10"
                      placeholder="********"
                      data-bs-toggle="tooltip"
                      title="Debe tener entre 8-10 caracteres"
                    />

                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="btnVerPassword"
                    >
                      <i class="bi bi-eye-slash"></i>
                    </button>
                  </div>
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 mt-2">
                Registrarse
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/Registro.js"></script>
  </body>
</html>
